<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - Alpha Distribuidora</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background-color:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:900px;
height:500px;
background:white;
display:flex;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.left{
width:50%;
padding:50px;
}

.right{
width:50%;
background:linear-gradient(135deg,#0f4c81,#1b5fa8);
color:white;
padding:50px;
display:flex;
flex-direction:column;
justify-content:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
background-color:#0f4c81;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background-color:#08355c;
}

.right h1{
font-size:28px;
margin-bottom:20px;
}

.right p{
opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

<div class="left">
<h2>Bem-vindo de volta</h2>

<form method="POST">
{% csrf_token %}

<label>E-mail Corporativo</label>
<input type="email" name="email" required>

<label>Senha</label>
<input type="password" name="senha" required>

<button type="submit">ENTRAR</button>

</form>
</div>

<div class="right">
<h1>Excelência em Distribuição e Logística</h1>
<p>
Gerencie seu inventário, acompanhe entregas e otimize sua cadeia de suprimentos.
</p>
</div>

</div>

</body>
</html>

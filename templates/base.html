{% load static %}
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Alpha Distribuidora{% endblock title %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body>
    <div class="layout-wrapper">
      <aside class="sidebar">
        <div class="sidebar-logo">
          <img
            src="{% static 'img/alpha_logo.png' %}"
            alt="Logo Alpha Distribuidora"
          />
        </div>
        <nav class="sidebar-nav">
          <ul>
            <li>
              <a href="{% url 'pagina_interna:dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                  <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                </svg>
                Dashboard
              </a>
            </li>
            <li>
              <a href="{% url 'pagina_interna:cadastro_clientes' %}" class="{% if request.resolver_match.url_name == 'cadastro_clientes' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                  <circle cx="9" cy="7" r="4"/>
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                Clientes
              </a>
            </li>
            <li>
              <a href="{% url 'pagina_interna:vendedores' %}" class="{% if request.resolver_match.url_name == 'vendedores' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                  <circle cx="8.5" cy="7" r="4"/>
                  <polyline points="17 11 19 13 23 9"/>
                </svg>
                Vendedores
              </a>
            </li>
            <li>
              <a href="{% url 'pagina_interna:vendas' %}" class="{% if request.resolver_match.url_name == 'vendas' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                  <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                Vendas
              </a>
            </li>
            <li>
              <a href="{% url 'pagina_interna:produtos' %}" class="{% if request.resolver_match.url_name == 'produtos' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                  <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                  <line x1="12" y1="22.08" x2="12" y2="12"/>
                </svg>
                Produtos
              </a>
            </li>
            <li>
              <a href="{% url 'pagina_interna:financeiro' %}" class="{% if request.resolver_match.url_name == 'financeiro' %}active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="1" x2="12" y2="23"/>
                  <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                Financeiro
              </a>
            </li>
          </ul>
        </nav>
        <div class="sidebar-footer">
          <a href="#">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sair do sistema
          </a>
        </div>
      </aside>
      <main class="main-content">
        <header class="top-header">
          <div class="header-title">
            <h2>
              {% block header_title %}Dashboard{% endblock header_title %}
            </h2>
          </div>
          <div class="header-search">
            <input type="text" placeholder="Buscar..." />
          </div>
          <div class="header-profile">
            <div class="profile-info">
              <span class="profile-name">Nome</span>
              <span class="profile-role">Cargo</span>
            </div>
            <img src="{% static 'img/user.png' %}" class="profile-avatar" />
          </div>
        </header>
        <div class="content-area">
          {% block content %} {% endblock content %}
        </div>
      </main>
    </div>
  </body>
</html>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
